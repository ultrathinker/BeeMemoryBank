appId: com.beememorybank.mobile
---
- runFlow: _go_home.yaml
- tapOn:
    text: "Open navigation drawer"
- extendedWaitUntil:
    visible:
      text: "Status"
    timeout: 3000
- tapOn:
    text: "Status"
# Scroll to top first in case page was left scrolled
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- extendedWaitUntil:
    visible:
      text: "Node Info"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Sync Now"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "Sync Now"
- scrollUntilVisible:
    element:
      text: "Node Info"
    direction: UP
    timeout: 10000
- takeScreenshot: sync_now_done
