appId: com.beememorybank.mobile
---
- runFlow: _go_home.yaml
- tapOn:
    text: "Open navigation drawer"
- extendedWaitUntil:
    visible:
      text: "Tags"
    timeout: 3000
- tapOn:
    text: "Tags"
- extendedWaitUntil:
    visible:
      id: "com.beememorybank.mobile:id/TagsList"
    timeout: 10000
- tapOn:
    id: "com.beememorybank.mobile:id/TagsSearchBar"
- inputText: "fiction"
- extendedWaitUntil:
    visible:
      text: "fiction"
    timeout: 3000
- takeScreenshot: tags_filtered
- eraseText: 6
- takeScreenshot: tags_cleared
