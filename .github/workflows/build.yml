name: Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore BeeMemoryBank.slnx

      - name: Build
        run: dotnet build BeeMemoryBank.slnx --no-restore -c Release

      - name: Test
        run: dotnet test BeeMemoryBank.slnx --no-build -c Release --verbosity normal
