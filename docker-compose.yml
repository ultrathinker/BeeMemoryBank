services:
  bmb:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BMB_PORT:-5000}:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BMB_DATA_PATH=/app/data
      # Required for admin operations and MCP access. Generate with:
      # openssl rand -hex 32
      # - BMB_INTERNAL_KEY=your-secret-key-here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
