<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeMemoryBank — Maintenance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 24px;
            animation: spin 2s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f7c948;
        }
        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .hint {
            font-size: 0.82rem;
            color: #475569;
        }
        .refresh-btn {
            display: inline-block;
            margin-top: 24px;
            padding: 10px 24px;
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background: #273449; }
    </style>
    <script>
        function checkSite() {
            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then(res => {
                    if (res.status !== 502 && res.status !== 503) {
                        location.href = '/';
                    }
                })
                .catch(() => {});
        }
        var delay = 5000;
        var titleText = 'Maintenance in progress';
        if (location.search.indexOf('restore') >= 0) {
            titleText = 'Snapshot restore in progress';
            document.getElementById('title-text').textContent = titleText;
        }
        setTimeout(function() {
            setInterval(checkSite, 3000);
        }, delay);
    </script>
</head>
<body>
    <div class="container">
        <div class="icon">⚙️</div>
        <h1 id="title-text">Maintenance in progress</h1>
        <p>BeeMemoryBank is temporarily unavailable.<br>Please wait while the operation completes.</p>
        <p class="hint">Page redirects automatically when the site is back up.</p>
        <a href="/" class="refresh-btn">Refresh now</a>
    </div>
</body>
</html>
